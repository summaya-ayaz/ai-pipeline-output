<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Counter</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f7fa;
    color: #1a202c;
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    padding: 2.5rem 3rem;
    text-align: center;
    max-width: 420px;
    width: 100%;
  }
  h1 {
    margin: 0 0 1.5rem;
    font-size: 2rem;
    color: #2d3748;
  }
  .counter-value {
    font-size: 5rem;
    font-weight: 700;
    color: #2b6cb0;
    margin: 1rem 0 2rem;
    font-variant-numeric: tabular-nums;
  }
  .controls {
    display: flex;
    gap: 0.75rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  button {
    font-size: 1rem;
    font-weight: 600;
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: transform 0.05s ease, background-color 0.15s ease;
    min-width: 90px;
  }
  button:active { transform: translateY(1px); }
  button:focus-visible {
    outline: 3px solid #4299e1;
    outline-offset: 2px;
  }
  .btn-inc { background: #38a169; color: #fff; }
  .btn-inc:hover { background: #2f855a; }
  .btn-dec { background: #e53e3e; color: #fff; }
  .btn-dec:hover { background: #c53030; }
  .btn-reset { background: #718096; color: #fff; }
  .btn-reset:hover { background: #4a5568; }
</style>
</head>
<body>
  <main class="card">
    <h1>Counter</h1>
    <div
      id="counter-value"
      data-testid="counter-value"
      class="counter-value"
      aria-live="polite"
      aria-label="Current counter value"
    >0</div>
    <div class="controls" role="group" aria-label="Counter controls">
      <button
        type="button"
        id="decrement-btn"
        data-testid="decrement-btn"
        class="btn-dec"
        aria-label="Decrement counter"
      >−</button>
      <button
        type="button"
        id="reset-btn"
        data-testid="reset-btn"
        class="btn-reset"
        aria-label="Reset counter to zero"
      >Reset</button>
      <button
        type="button"
        id="increment-btn"
        data-testid="increment-btn"
        class="btn-inc"
        aria-label="Increment counter"
      >+</button>
    </div>
  </main>

  <script>
    (function () {
      var STORAGE_KEY = 'counter';
      var display = document.getElementById('counter-value');
      var incBtn = document.getElementById('increment-btn');
      var decBtn = document.getElementById('decrement-btn');
      var resetBtn = document.getElementById('reset-btn');

      function load() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          if (raw === null) return 0;
          var n = parseInt(raw, 10);
          return isNaN(n) ? 0 : n;
        } catch (e) {
          return 0;
        }
      }

      function save(value) {
        try {
          localStorage.setItem(STORAGE_KEY, String(value));
        } catch (e) {}
      }

      var count = load();

      function render() {
        display.textContent = String(count);
      }

      function update(newValue) {
        count = newValue;
        save(count);
        render();
      }

      incBtn.addEventListener('click', function () { update(count + 1); });
      decBtn.addEventListener('click', function () { update(count - 1); });
      resetBtn.addEventListener('click', function () { update(0); });

      render();
    })();
  </script>
</body>
</html>
